version: v2
plugins:
  - protoc_builtin: go
    out: ../internal/services/spec
    opt: paths=source_relative
  - local: protoc-gen-connect-go
    out: ../internal/services/spec
    opt: paths=source_relative
inputs:
  - directory: ../../proto/envd
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: git.omukk.dev/wrenn/sandbox/envd/internal/services/spec
