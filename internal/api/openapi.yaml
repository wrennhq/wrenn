openapi: "3.1.0"
info:
  title: Wrenn API
  description: MicroVM-based code execution platform API.
  version: "0.1.3"

servers:
  - url: http://localhost:8080
    description: Local development

security: []

paths:
  /v1/auth/signup:
    post:
      summary: Create a new account
      operationId: signup
      tags: [auth]
      description: |
        Creates an inactive user account and sends an activation email.
        The user must activate their account within 30 minutes.
        Does not return a JWT — the user must activate first, then sign in.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: Account created, activation email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignupResponse"
        "400":
          description: Invalid request (bad email, short password)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email already registered or signup cooldown active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/auth/activate:
    post:
      summary: Activate account via email token
      operationId: activate
      tags: [auth]
      description: |
        Consumes the activation token sent via email and activates the user account.
        Creates a default team and returns a JWT to log the user in.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Account activated, JWT issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/auth/switch-team:
    post:
      summary: Switch active team
      operationId: switchTeam
      tags: [auth]
      security:
        - bearerAuth: []
      description: |
        Re-issues a JWT scoped to a different team. The user must be a member of
        the target team (verified from DB). Use the returned token for subsequent
        requests to that team's resources.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [team_id]
              properties:
                team_id:
                  type: string
      responses:
        "200":
          description: New JWT issued for the target team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "403":
          description: Not a member of this team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Team not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/auth/login:
    post:
      summary: Log in with email and password
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/auth/oauth/{provider}:
    parameters:
      - name: provider
        in: path
        required: true
        schema:
          type: string
          enum: [github]
        description: OAuth provider name

    get:
      summary: Start OAuth login flow
      operationId: oauthRedirect
      tags: [auth]
      description: |
        Redirects the user to the OAuth provider's authorization page.
        Sets a short-lived CSRF state cookie for validation on callback.
      responses:
        "302":
          description: Redirect to provider authorization URL
        "404":
          description: Provider not found or not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/auth/oauth/{provider}/callback:
    parameters:
      - name: provider
        in: path
        required: true
        schema:
          type: string
          enum: [github]
        description: OAuth provider name

    get:
      summary: OAuth callback
      operationId: oauthCallback
      tags: [auth]
      description: |
        Handles the OAuth provider's callback after user authorization.
        Exchanges the authorization code for a user profile, creates or
        logs in the user, and redirects to the frontend with a JWT token.

        **On success:** redirects to `{OAUTH_REDIRECT_URL}/auth/{provider}/callback?token=...&user_id=...&team_id=...&email=...`

        **On error:** redirects to `{OAUTH_REDIRECT_URL}/auth/{provider}/callback?error=...`

        Possible error codes: `access_denied`, `invalid_state`, `missing_code`,
        `exchange_failed`, `email_taken`, `internal_error`.
      parameters:
        - name: code
          in: query
          schema:
            type: string
          description: Authorization code from the OAuth provider
        - name: state
          in: query
          schema:
            type: string
          description: CSRF state parameter (must match the cookie)
      responses:
        "302":
          description: Redirect to frontend with token or error

  /v1/me:
    get:
      summary: Get current user profile
      operationId: getMe
      tags: [account]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"

    patch:
      summary: Update display name
      operationId: updateName
      tags: [account]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
      responses:
        "200":
          description: Name updated, new JWT issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: Delete current account
      operationId: deleteAccount
      tags: [account]
      security:
        - bearerAuth: []
      description: |
        Soft-deletes the account (sets status=deleted, deleted_at=now).
        The account is permanently removed after 15 days. Blocked if the user
        owns any team that has other members.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmation]
              properties:
                confirmation:
                  type: string
                  description: Must match the user's email address (case-insensitive)
      responses:
        "204":
          description: Account scheduled for deletion
        "400":
          description: Confirmation does not match email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: User owns teams with other members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/me/password:
    post:
      summary: Change or add password
      operationId: changePassword
      tags: [account]
      security:
        - bearerAuth: []
      description: |
        For users with an existing password: requires `current_password` and `new_password`.
        For OAuth-only users adding a password: requires `new_password` and `confirm_password`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "204":
          description: Password updated
        "400":
          description: Invalid request (short password, mismatch, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Current password is incorrect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/me/password/reset:
    post:
      summary: Request a password reset email
      operationId: requestPasswordReset
      tags: [account]
      description: |
        Sends a password reset link to the given email. Always returns 200
        regardless of whether the email exists, to prevent account enumeration.
        The reset token expires in 15 minutes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "204":
          description: Request accepted (email sent if account exists)

  /v1/me/password/reset/confirm:
    post:
      summary: Confirm password reset
      operationId: confirmPasswordReset
      tags: [account]
      description: |
        Consumes a password reset token and sets a new password. The token is
        single-use and expires after 15 minutes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token:
                  type: string
                  description: Raw reset token from the email link
                new_password:
                  type: string
                  minLength: 8
      responses:
        "204":
          description: Password reset successful
        "400":
          description: Invalid or expired token, or password too short
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/me/providers/{provider}/connect:
    parameters:
      - name: provider
        in: path
        required: true
        schema:
          type: string
          enum: [github]
        description: OAuth provider name

    get:
      summary: Initiate OAuth provider link
      operationId: connectProvider
      tags: [account]
      security:
        - bearerAuth: []
      description: |
        Sets OAuth state and link cookies, then returns the provider's
        authorization URL. The frontend navigates to this URL to start the
        OAuth flow. On callback, the provider is linked to the current account
        (not a new registration).
      responses:
        "200":
          description: Authorization URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  auth_url:
                    type: string
                    format: uri
        "404":
          description: Provider not found or not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/me/providers/{provider}:
    parameters:
      - name: provider
        in: path
        required: true
        schema:
          type: string
          enum: [github]
        description: OAuth provider name

    delete:
      summary: Disconnect an OAuth provider
      operationId: disconnectProvider
      tags: [account]
      security:
        - bearerAuth: []
      description: |
        Unlinks the OAuth provider from the current account. Blocked if this
        is the user's only login method (no password and no other providers).
      responses:
        "204":
          description: Provider disconnected
        "400":
          description: Cannot disconnect last login method
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Provider not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/api-keys:
    post:
      summary: Create an API key
      operationId: createAPIKey
      tags: [api-keys]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPIKeyRequest"
      responses:
        "201":
          description: API key created (plaintext key only shown once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      summary: List API keys for your team
      operationId: listAPIKeys
      tags: [api-keys]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of API keys (plaintext keys are never returned)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/APIKeyResponse"

  /v1/api-keys/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string

    delete:
      summary: Delete an API key
      operationId: deleteAPIKey
      tags: [api-keys]
      security:
        - bearerAuth: []
      responses:
        "204":
          description: API key deleted

  /v1/users/search:
    get:
      summary: Search users by email prefix
      operationId: searchUsers
      tags: [users]
      security:
        - bearerAuth: []
      description: |
        Returns up to 10 users whose email starts with the given prefix.
        The prefix must contain "@". Intended for the add-member UI autocomplete.
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
          description: Email prefix (must contain "@", e.g. "alice@")
      responses:
        "200":
          description: Matching users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserSearchResult"
        "400":
          description: Prefix does not contain "@"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/teams:
    get:
      summary: List teams for the authenticated user
      operationId: listTeams
      tags: [teams]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Teams the user belongs to, each with their role
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamWithRole"

    post:
      summary: Create a new team
      operationId: createTeam
      tags: [teams]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  description: 1-128 chars; A-Z a-z 0-9 space _
      responses:
        "201":
          description: Team created (caller is owner)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamWithRole"
        "400":
          description: Invalid team name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/teams/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Team ID (must match the JWT's team_id)

    get:
      summary: Get team info and member list
      operationId: getTeam
      tags: [teams]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Team details with members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamDetail"
        "403":
          description: JWT team does not match requested team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Team not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    patch:
      summary: Rename the team
      operationId: renameTeam
      tags: [teams]
      security:
        - bearerAuth: []
      description: Admin or owner role required (verified from DB).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "204":
          description: Renamed
        "400":
          description: Invalid team name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: Delete the team
      operationId: deleteTeam
      tags: [teams]
      security:
        - bearerAuth: []
      description: |
        Owner only. Soft-deletes the team and destroys all running/paused/starting
        capsulees. All DB records are preserved. The team slug is permanently reserved.
      responses:
        "204":
          description: Team deleted
        "403":
          description: Caller is not the owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/teams/{id}/members:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string

    get:
      summary: List team members
      operationId: listTeamMembers
      tags: [teams]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Members with roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"

    post:
      summary: Add a member by email
      operationId: addTeamMember
      tags: [teams]
      security:
        - bearerAuth: []
      description: Admin or owner role required. User is added instantly as a member.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No account with that email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "400":
          description: User is already a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/teams/{id}/members/{uid}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: uid
        in: path
        required: true
        schema:
          type: string
        description: Target user ID

    patch:
      summary: Update member role
      operationId: updateMemberRole
      tags: [teams]
      security:
        - bearerAuth: []
      description: |
        Admin or owner required. Valid target roles: admin, member.
        The owner's role cannot be changed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [admin, member]
      responses:
        "204":
          description: Role updated
        "403":
          description: Insufficient role or attempt to modify owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User is not a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: Remove a member
      operationId: removeTeamMember
      tags: [teams]
      security:
        - bearerAuth: []
      description: Admin or owner required. Owner cannot be removed.
      responses:
        "204":
          description: Member removed
        "403":
          description: Insufficient role or attempt to remove owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User is not a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/teams/{id}/leave:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string

    post:
      summary: Leave the team
      operationId: leaveTeam
      tags: [teams]
      security:
        - bearerAuth: []
      description: The owner cannot leave; they must delete the team instead.
      responses:
        "204":
          description: Left the team
        "403":
          description: Owner cannot leave
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/capsules:
    post:
      summary: Create a capsule
      operationId: createCapsule
      tags: [capsules]
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCapsuleRequest"
      responses:
        "201":
          description: Capsule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capsule"
        "502":
          description: Host agent error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      summary: List capsulees for your team
      operationId: listCapsules
      tags: [capsules]
      security:
        - apiKeyAuth: []
      responses:
        "200":
          description: List of capsulees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Capsule"

  /v1/capsules/stats:
    get:
      summary: Get capsule usage stats for your team
      operationId: getCapsuleStats
      tags: [capsules]
      security:
        - apiKeyAuth: []
      parameters:
        - name: range
          in: query
          required: false
          schema:
            type: string
            enum: [5m, 1h, 6h, 24h, 30d]
            default: 1h
          description: Time window for the time-series data.
      responses:
        "200":
          description: Capsule stats for the team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapsuleStats"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/capsules/usage:
    get:
      summary: Get daily CPU and RAM usage for your team
      operationId: getCapsuleUsage
      tags: [capsules]
      security:
        - apiKeyAuth: []
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Start date (YYYY-MM-DD). Defaults to 30 days ago.
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
          description: End date (YYYY-MM-DD). Defaults to today.
      responses:
        "200":
          description: Daily usage data for the team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/capsules/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string

    get:
      summary: Get capsule details
      operationId: getCapsule
      tags: [capsules]
      security:
        - apiKeyAuth: []
      responses:
        "200":
          description: Capsule details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capsule"
        "404":
          description: Capsule not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: Destroy a capsule
      operationId: destroyCapsule
      tags: [capsules]
      security:
        - apiKeyAuth: []
      responses:
        "204":
          description: Capsule destroyed

  /v1/capsules/{id}/exec:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string

    post:
      summary: Execute a command
      operationId: execCommand
      tags: [capsules]
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecRequest"
      responses:
        "200":
          description: Command output (foreground exec)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecResponse"
        "202":
          description: Background process started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackgroundExecResponse"
        "404":
          description: Capsule not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Capsule not running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/capsules/{id}/processes:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string

    get:
      summary: List running processes
      operationId: listProcesses
      tags: [capsules]
      security:
        - apiKeyAuth: []
      description: |
        Returns all running processes inside the capsule, including background
        processes and any processes started by templates or init scripts.
      responses:
        "200":
          description: Process list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessListResponse"
        "404":
          description: Capsule not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Capsule not running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/capsules/{id}/processes/{selector}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: selector
        in: path
        required: true
        description: Process PID (numeric) or tag (string)
        schema:
          type: string

    delete:
      summary: Kill a process
      operationId: killProcess
      tags: [capsules]
      security:
        - apiKeyAuth: []
      parameters:
        - name: signal
          in: query
          required: false
          description: Signal to send (SIGKILL or SIGTERM, default SIGKILL)
          schema:
            type: string
            enum: [SIGKILL, SIGTERM]
            default: SIGKILL
      responses:
        "204":
          description: Process killed
        "404":
          description: Capsule or process not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Capsule not running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/capsules/{id}/processes/{selector}/stream:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: selector
        in: path
        required: true
        description: Process PID (numeric) or tag (string)
        schema:
          type: string

    get:
      summary: Stream process output via WebSocket
      operationId: connectProcess
      tags: [capsules]
      security:
        - apiKeyAuth: []
      description: |
        Opens a WebSocket connection to stream stdout/stderr from a running
        background process. The selector can be a numeric PID or a string tag.

        Server sends JSON messages:
        - `{"type": "start", "pid": 42}` — connected to process
        - `{"type": "stdout", "data": "..."}` — stdout output
        - `{"type": "stderr", "data": "..."}` — stderr output
        - `{"type": "exit", "exit_code": 0}` — process exited
        - `{"type": "error", "data": "..."}` — error message
      responses:
        "101":
          description: WebSocket upgrade

  /v1/capsules/{id}/ping:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string

    post:
      summary: Reset capsule inactivity timer
      operationId: pingCapsule
      tags: [capsules]
      security:
        - apiKeyAuth: []
      description: |
        Resets the last_active_at timestamp for a running capsule, preventing
        the auto-pause TTL from expiring. Use this as a keepalive for capsulees
        that are idle but should remain running.
      responses:
        "204":
          description: Ping acknowledged, inactivity timer reset
        "404":
          description: Capsule not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Capsule not running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/capsules/{id}/metrics:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string

    get:
      summary: Get per-capsule resource metrics
      operationId: getCapsuleMetrics
      tags: [capsules]
      security:
        - apiKeyAuth: []
        - bearerAuth: []
      description: |
        Returns time-series CPU, memory, and disk metrics for a capsule.
        Three tiers are available with different granularity and retention:
        - `10m`: 500ms samples, last 10 minutes
        - `2h`: 30-second averages, last 2 hours
        - `24h`: 5-minute averages, last 24 hours

        For running capsulees, data comes from the host agent's in-memory
        ring buffer. For paused capsulees, data is read from persisted
        snapshots in the database. Stopped/destroyed capsulees return 404.
      parameters:
        - name: range
          in: query
          required: false
          schema:
            type: string
            enum: ["5m", "10m", "1h", "2h", "6h", "12h", "24h"]
            default: "10m"
          description: Time range filter to query
      responses:
        "200":
          description: Metrics retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapsuleMetrics"
        "400":
          description: Invalid range parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Capsule not found or metrics not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/capsules/{id}/pause:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string

    post:
      summary: Pause a running capsule
      operationId: pauseCapsule
      tags: [capsules]
      security:
        - apiKeyAuth: []
      description: |
        Takes a snapshot of the capsule (VM state + memory + rootfs), then
        destroys all running resources. The capsule exists only as files on
        disk and can be resumed later.
      responses:
        "200":
          description: Capsule paused (snapshot taken, resources released)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capsule"
        "409":
          description: Capsule not running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/capsules/{id}/resume:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string

    post:
      summary: Resume a paused capsule
      operationId: resumeCapsule
      tags: [capsules]
      security:
        - apiKeyAuth: []
      description: |
        Restores a paused capsule from its snapshot using UFFD for lazy
        memory loading. Boots a fresh Firecracker process, sets up a new
        network slot, and waits for envd to become ready.
      responses:
        "200":
          description: Capsule resumed (new VM booted from snapshot)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capsule"
        "409":
          description: Capsule not paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/snapshots:
    post:
      summary: Create a snapshot template
      operationId: createSnapshot
      tags: [snapshots]
      security:
        - apiKeyAuth: []
      description: |
        Pauses a running capsule, takes a full snapshot, copies the snapshot
        files to the images directory as a reusable template, then destroys
        the capsule. The template can be used to create new capsulees.
      parameters:
        - name: overwrite
          in: query
          required: false
          schema:
            type: string
            enum: ["true"]
          description: Set to "true" to overwrite an existing snapshot with the same name.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSnapshotRequest"
      responses:
        "201":
          description: Snapshot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "409":
          description: Name already exists or capsule not running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      summary: List templates for your team
      operationId: listSnapshots
      tags: [snapshots]
      security:
        - apiKeyAuth: []
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [base, snapshot]
          description: Filter by template type.
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Template"

  /v1/snapshots/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string

    delete:
      summary: Delete a snapshot template
      operationId: deleteSnapshot
      tags: [snapshots]
      security:
