services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wrenn
      POSTGRES_PASSWORD: wrenn
      POSTGRES_DB: wrenn
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  caddy:
    image: caddy:2-alpine
    ports:
      - "8000:80"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
